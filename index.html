<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MonCompte</title>
<link href="https://fonts.googleapis.com/css2?family=Cabinet+Grotesk:wght@400;500;700;800;900&family=Instrument+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
:root[data-theme="dark"] {
  --bg:       #080810;
  --surface:  #0f0f1a;
  --card:     #13131f;
  --card2:    #1a1a2a;
  --border:   #252538;
  --border2:  #2e2e48;
  --text:     #ededf5;
  --text2:    #7070a0;
  --text3:    #40405a;
  --plus:     #34d399;
  --plus-bg:  rgba(52,211,153,0.08);
  --minus:    #f87171;
  --minus-bg: rgba(248,113,113,0.08);
  --apl:      #60a5fa;
  --apl-bg:   rgba(96,165,250,0.08);
  --acc:      #818cf8;
  --glow:     rgba(129,140,248,0.12);
}
:root[data-theme="light"] {
  --bg:       #f4f4fa;
  --surface:  #eaeaf5;
  --card:     #ffffff;
  --card2:    #f0f0f8;
  --border:   #dcdcee;
  --border2:  #c8c8e0;
  --text:     #0e0e1f;
  --text2:    #6060888;
  --text3:    #aaaacc;
  --plus:     #059669;
  --plus-bg:  rgba(5,150,105,0.08);
  --minus:    #dc2626;
  --minus-bg: rgba(220,38,38,0.08);
  --apl:      #2563eb;
  --apl-bg:   rgba(37,99,235,0.08);
  --acc:      #4f46e5;
  --glow:     rgba(79,70,229,0.08);
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Cabinet Grotesk', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  transition: background 0.3s, color 0.3s;
}

/* ── AUTH ── */
#auth-screen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}

.auth-glow {
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  pointer-events: none;
}
.auth-glow-1 { width:500px;height:500px;background:rgba(129,140,248,0.06);top:-150px;left:-150px; }
.auth-glow-2 { width:300px;height:300px;background:rgba(52,211,153,0.05);bottom:-50px;right:-50px; }

.auth-box {
  width: 400px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 44px 40px;
  position: relative;
  z-index: 1;
  animation: fadeUp .45s cubic-bezier(.16,1,.3,1);
}

.brand {
  font-size: 1.7rem;
  font-weight: 900;
  letter-spacing: -1.5px;
  color: var(--text);
  margin-bottom: 4px;
}
.brand em { color: var(--acc); font-style: normal; }
.brand-sub { color: var(--text2); font-size: 0.82rem; font-family: 'Instrument Mono', monospace; margin-bottom: 36px; }

.tabs {
  display: flex;
  background: var(--surface);
  border-radius: 12px;
  padding: 4px;
  margin-bottom: 28px;
  gap: 4px;
}
.tab {
  flex:1; border:none; background:transparent; padding:9px;
  border-radius:9px; cursor:pointer; font-family:'Cabinet Grotesk',sans-serif;
  font-weight:700; font-size:0.85rem; color:var(--text2); transition:all .2s;
}
.tab.active { background:var(--card); color:var(--text); box-shadow:0 1px 4px rgba(0,0,0,0.15); }

.field { margin-bottom:16px; }
.field label { display:block; font-size:0.72rem; font-family:'Instrument Mono',monospace; letter-spacing:1.5px; color:var(--text2); margin-bottom:8px; text-transform:uppercase; }
.field input {
  width:100%; padding:12px 14px;
  background:var(--surface); border:1px solid var(--border);
  border-radius:11px; color:var(--text);
  font-family:'Cabinet Grotesk',sans-serif; font-size:0.92rem;
  outline:none; transition:border .2s, box-shadow .2s;
}
.field input:focus { border-color:var(--acc); box-shadow:0 0 0 3px var(--glow); }

.btn-main {
  width:100%; padding:13px; margin-top:6px;
  background:var(--acc); color:#fff; border:none;
  border-radius:11px; font-family:'Cabinet Grotesk',sans-serif;
  font-weight:800; font-size:0.95rem; cursor:pointer;
  transition:opacity .2s, transform .15s;
}
.btn-main:hover { opacity:.92; transform:translateY(-1px); }
.btn-main:active { transform:translateY(0); }

.err { color:var(--minus); font-size:0.78rem; font-family:'Instrument Mono',monospace; margin-top:12px; min-height:18px; text-align:center; }

/* ── APP ── */
#app { display:none; max-width:760px; margin:0 auto; padding:32px 20px 80px; }

.app-header {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:32px;
}
.app-brand { font-size:1.3rem; font-weight:900; letter-spacing:-0.5px; }
.app-brand em { color:var(--acc); font-style:normal; }

.header-actions { display:flex; gap:10px; align-items:center; }

.btn-logout-main {
  display:flex; align-items:center; gap:7px;
  padding:9px 16px; border-radius:10px;
  background:var(--card); border:1px solid var(--border);
  color:var(--text2); cursor:pointer;
  font-family:'Cabinet Grotesk',sans-serif;
  font-weight:700; font-size:0.85rem;
  transition:all .2s;
}
.btn-logout-main:hover { border-color:var(--minus); color:var(--minus); background:var(--minus-bg); }

.btn-icon {
  width:38px; height:38px; border-radius:10px;
  background:var(--card); border:1px solid var(--border);
  color:var(--text2); cursor:pointer; display:flex;
  align-items:center; justify-content:center; transition:all .2s;
  font-size:1rem;
}
.btn-icon:hover { border-color:var(--border2); color:var(--text); }

/* ── SOLDE BIG ── */
.solde-block {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 22px;
  padding: 32px 36px;
  margin-bottom: 20px;
  position: relative;
  overflow: hidden;
  animation: fadeUp .5s cubic-bezier(.16,1,.3,1);
}
.solde-block::before {
  content:'';
  position:absolute; top:-60px; right:-60px;
  width:200px; height:200px;
  background:var(--glow);
  border-radius:50%;
  pointer-events:none;
}
.solde-label {
  font-family:'Instrument Mono',monospace;
  font-size:0.72rem; letter-spacing:2px; text-transform:uppercase;
  color:var(--text2); margin-bottom:10px;
}
.solde-amount {
  font-size:clamp(2.4rem, 8vw, 3.6rem);
  font-weight:900;
  letter-spacing:-2px;
  line-height:1;
  transition: color .3s;
}
.solde-amount.pos { color: var(--plus); }
.solde-amount.neg { color: var(--minus); }
.solde-amount.zero { color: var(--text2); }

.solde-mini {
  display:flex; gap:24px; margin-top:20px; padding-top:20px;
  border-top:1px solid var(--border);
}
.mini-stat { }
.mini-label { font-size:0.7rem; font-family:'Instrument Mono',monospace; color:var(--text2); letter-spacing:1px; text-transform:uppercase; margin-bottom:4px; }
.mini-val { font-size:1.1rem; font-weight:800; letter-spacing:-0.5px; }
.mini-val.p { color:var(--plus); }
.mini-val.m { color:var(--minus); }
.mini-val.a { color:var(--apl); }

/* ── QUICK ADD ── */
.quick-add {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 22px;
  padding: 24px 28px;
  margin-bottom: 20px;
  animation: fadeUp .55s cubic-bezier(.16,1,.3,1);
}
.qa-title {
  font-weight:800; font-size:0.88rem; letter-spacing:-.3px;
  color:var(--text2); text-transform:uppercase;
  font-family:'Instrument Mono',monospace; font-size:0.7rem;
  letter-spacing:1.5px; margin-bottom:18px;
}
.qa-row { display:flex; gap:10px; }
.qa-input-wrap { flex:1; position:relative; }
.qa-input-wrap input {
  width:100%; padding:13px 16px;
  background:var(--surface); border:1px solid var(--border);
  border-radius:12px; color:var(--text);
  font-family:'Cabinet Grotesk',sans-serif; font-size:0.95rem;
  outline:none; transition:border .2s;
}
.qa-input-wrap input:focus { border-color:var(--border2); }

.qa-type-btns { display:flex; gap:8px; margin-bottom:14px; }
.type-btn {
  flex:1; padding:9px 14px; border-radius:10px; border:1px solid var(--border);
  background:transparent; cursor:pointer; font-family:'Cabinet Grotesk',sans-serif;
  font-weight:700; font-size:0.82rem; color:var(--text2); transition:all .2s;
}
.type-btn.active-dep  { background:var(--minus-bg); border-color:var(--minus); color:var(--minus); }
.type-btn.active-apl  { background:var(--apl-bg);   border-color:var(--apl);   color:var(--apl); }
.type-btn.active-ent  { background:var(--plus-bg);  border-color:var(--plus);  color:var(--plus); }

.btn-add-op {
  padding:13px 22px; background:var(--acc); color:#fff;
  border:none; border-radius:12px; cursor:pointer;
  font-family:'Cabinet Grotesk',sans-serif; font-weight:800;
  font-size:0.9rem; transition:all .2s; white-space:nowrap;
}
.btn-add-op:hover { opacity:.9; transform:translateY(-1px); }

/* ── OPERATIONS LIST ── */
.ops-section { animation: fadeUp .6s cubic-bezier(.16,1,.3,1); }
.ops-header {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:14px;
}
.ops-title {
  font-weight:800; font-size:1.05rem; letter-spacing:-.4px;
}
.ops-count {
  font-family:'Instrument Mono',monospace; font-size:0.75rem;
  color:var(--text2); background:var(--card2); border:1px solid var(--border);
  padding:3px 10px; border-radius:20px;
}

.op-item {
  display:flex; align-items:center; gap:14px;
  background:var(--card); border:1px solid var(--border);
  border-radius:16px; padding:16px 20px; margin-bottom:10px;
  transition: transform .15s, box-shadow .15s;
  animation: slideIn .3s cubic-bezier(.16,1,.3,1);
}
.op-item:hover { transform:translateX(3px); box-shadow:0 4px 20px rgba(0,0,0,0.1); }

@keyframes slideIn { from{opacity:0;transform:translateX(-12px);} to{opacity:1;transform:translateX(0);} }

.op-icon {
  width:40px; height:40px; border-radius:12px;
  display:flex; align-items:center; justify-content:center;
  font-size:1.1rem; flex-shrink:0;
}
.op-icon.dep  { background:var(--minus-bg); }
.op-icon.ent  { background:var(--plus-bg); }
.op-icon.apl  { background:var(--apl-bg); }

.op-info { flex:1; min-width:0; }
.op-label {
  font-weight:700; font-size:0.95rem; letter-spacing:-.3px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.op-date {
  font-family:'Instrument Mono',monospace; font-size:0.7rem;
  color:var(--text2); margin-top:2px;
}

.op-amount {
  font-weight:900; font-size:1.1rem; letter-spacing:-.5px; flex-shrink:0;
}
.op-amount.dep { color:var(--minus); }
.op-amount.ent { color:var(--plus); }
.op-amount.apl { color:var(--apl); }

.btn-del {
  width:30px; height:30px; border-radius:8px; border:1px solid transparent;
  background:transparent; color:var(--text3); cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  font-size:0.85rem; transition:all .2s; flex-shrink:0;
}
.btn-del:hover { border-color:var(--minus); color:var(--minus); background:var(--minus-bg); }

.empty {
  text-align:center; padding:48px 20px;
  background:var(--card); border:1px dashed var(--border);
  border-radius:18px;
}
.empty-icon { font-size:2.5rem; margin-bottom:10px; }
.empty-txt { color:var(--text2); font-size:0.85rem; }

/* ── MONTH FILTER ── */
.month-filter {
  display:flex; gap:6px; flex-wrap:wrap; margin-bottom:16px;
}
.month-pill {
  padding:5px 12px; border-radius:20px; border:1px solid var(--border);
  background:transparent; color:var(--text2); cursor:pointer;
  font-family:'Cabinet Grotesk',sans-serif; font-size:0.78rem; font-weight:600;
  transition:all .2s;
}
.month-pill.active { background:var(--acc); border-color:var(--acc); color:#fff; }

/* ── MODAL EDIT ── */
.overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.55);
  backdrop-filter:blur(6px); z-index:500;
  display:none; align-items:center; justify-content:center;
}
.overlay.open { display:flex; }
.modal {
  background:var(--card); border:1px solid var(--border);
  border-radius:22px; padding:32px; width:420px;
  animation:fadeUp .3s cubic-bezier(.16,1,.3,1);
}
.modal-title { font-size:1.15rem; font-weight:900; letter-spacing:-.5px; margin-bottom:24px; }
.modal-actions { display:flex; gap:10px; margin-top:22px; }
.btn-sec {
  flex:1; padding:12px; background:var(--surface);
  border:1px solid var(--border); border-radius:10px;
  color:var(--text2); cursor:pointer; font-family:'Cabinet Grotesk',sans-serif;
  font-weight:700; font-size:0.88rem; transition:all .2s;
}
.btn-sec:hover { color:var(--text); border-color:var(--border2); }

/* ── UTILS ── */
@keyframes fadeUp { from{opacity:0;transform:translateY(20px);} to{opacity:1;transform:translateY(0);} }

.spin { display:inline-block; width:14px;height:14px; border:2px solid rgba(255,255,255,.3); border-top-color:#fff; border-radius:50%; animation:spin .7s linear infinite; }
@keyframes spin { to{transform:rotate(360deg);} }

.tag {
  display:inline-block; padding:2px 8px; border-radius:6px;
  font-size:0.68rem; font-family:'Instrument Mono',monospace; font-weight:500;
  margin-left:6px; vertical-align:middle;
}
.tag-dep  { background:var(--minus-bg); color:var(--minus); }
.tag-ent  { background:var(--plus-bg);  color:var(--plus); }
.tag-apl  { background:var(--apl-bg);   color:var(--apl); }

/* APL badge */
.apl-badge {
  background: var(--apl-bg); border:1px solid rgba(96,165,250,0.2);
  border-radius: 12px; padding:14px 18px; margin-bottom:20px;
  display:flex; align-items:center; gap:12px; font-size:0.82rem;
  animation: fadeUp .5s cubic-bezier(.16,1,.3,1);
}
.apl-badge-icon { font-size:1.3rem; }
.apl-badge-text { color:var(--text2); }
.apl-badge-text strong { color:var(--apl); }

@media (max-width:500px) {
  #app { padding:20px 14px 80px; }
  .solde-amount { font-size:2.4rem; }
  .qa-row { flex-direction:column; }
}
</style>
</head>
<body>

<!-- ═══════════════ AUTH ═══════════════ -->
<div id="auth-screen">
  <div class="auth-glow auth-glow-1"></div>
  <div class="auth-glow auth-glow-2"></div>
  <div class="auth-box">
    <div class="brand">Mon<em>Compte</em></div>
    <div class="brand-sub">gestionnaire personnel</div>

    <div class="tabs">
      <button class="tab active" id="tab-login" onclick="switchTab('login')">Connexion</button>
      <button class="tab" id="tab-register" onclick="switchTab('register')">Inscription</button>

    </div>

    <div id="form-login">
      <div class="field"><label>Email</label><input type="email" id="l-email" placeholder="vous@exemple.fr" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <div class="field"><label>Mot de passe</label><input type="password" id="l-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <button class="btn-main" onclick="doLogin()"><span id="l-txt">Se connecter</span></button>
    </div>

    <div id="form-register" style="display:none">
      <div class="field"><label>Email</label><input type="email" id="r-email" placeholder="vous@exemple.fr"></div>
      <div class="field"><label>Mot de passe</label><input type="password" id="r-pass" placeholder="Min. 6 caractères"></div>
      <button class="btn-main" onclick="doRegister()"><span id="r-txt">Créer mon compte</span></button>
    </div>

    <div class="err" id="auth-err"></div>
  </div>
</div>

<!-- ═══════════════ APP ═══════════════ -->
<div id="app">

  <div class="app-header">
    <div class="app-brand">Mon<em>Compte</em></div>
    <div class="header-actions">
      <button class="btn-icon" onclick="toggleTheme()" title="Thème">☀️</button>
      <button class="btn-logout-main" onclick="doLogout()">⎋ Déconnexion</button>
    </div>
  </div>

  <!-- Solde -->
  <div class="solde-block">
    <div class="solde-label">Solde actuel</div>
    <div class="solde-amount" id="solde-display">0,00 €</div>
    <div class="solde-mini">
      <div class="mini-stat">
        <div class="mini-label">Entrées</div>
        <div class="mini-val p" id="total-plus">0,00 €</div>
      </div>
      <div class="mini-stat">
        <div class="mini-label">Dépenses</div>
        <div class="mini-val m" id="total-minus">0,00 €</div>
      </div>
      <div class="mini-stat">
        <div class="mini-label">APL reçues</div>
        <div class="mini-val a" id="total-apl">0,00 €</div>
      </div>
    </div>
  </div>

  <!-- Info APL -->
  <div class="apl-badge">
    <div class="apl-badge-icon">🏠</div>
    <div class="apl-badge-text">APL = <strong>+199,00 €</strong> — Aide au logement reçue chaque mois</div>
  </div>

  <!-- Formulaire ajout -->
  <div class="quick-add">
    <div class="qa-title">Nouvelle opération</div>

    <div class="qa-type-btns">
      <button class="type-btn active-dep" id="btn-dep" onclick="setType('dep')">💸 Dépense</button>
      <button class="type-btn" id="btn-apl" onclick="setType('apl')">🏠 APL (+199€)</button>
      <button class="type-btn" id="btn-ent" onclick="setType('ent')">💰 Autre entrée</button>
    </div>

    <div class="qa-row">
      <div class="qa-input-wrap">
        <input type="text" id="qa-label" placeholder="Ex: Pharmacie, Courses, Loyer…" onkeydown="if(event.key==='Enter')addOp()">
      </div>
      <div class="qa-input-wrap" style="max-width:140px">
        <input type="number" id="qa-amount" step="0.01" min="0" placeholder="Montant" onkeydown="if(event.key==='Enter')addOp()">
      </div>
      <button class="btn-add-op" onclick="addOp()">Ajouter +</button>
    </div>
  </div>

  <!-- Liste -->
  <div class="ops-section">
    <div class="ops-header">
      <div class="ops-title">Opérations</div>
      <div class="ops-count" id="ops-count">0 op.</div>
    </div>

    <div class="month-filter" id="month-filter"></div>

    <div id="ops-list">
      <div class="empty">
        <div class="empty-icon">📂</div>
        <div class="empty-txt">Aucune opération — ajoutez-en une ci-dessus</div>
      </div>
    </div>
  </div>
</div>

<!-- ═══════════ MODAL EDIT ═══════════ -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-title">Modifier l'opération</div>
    <div class="field"><label>Libellé</label><input type="text" id="edit-label"></div>
    <div class="field"><label>Montant (€)</label><input type="number" id="edit-amount" step="0.01" min="0"></div>
    <div class="modal-actions">
      <button class="btn-sec" onclick="closeEdit()">Annuler</button>
      <button class="btn-main" style="flex:2" onclick="saveEdit()">Enregistrer</button>
    </div>
  </div>
</div>

  showAuth();
}

// ── AUTH ACTIONS ──
window.switchTab = function(t) {
  document.getElementById('form-login').style.display    = t === 'login'    ? 'block' : 'none';
  document.getElementById('form-register').style.display = t === 'register' ? 'block' : 'none';
  document.getElementById('tab-login').className    = 'tab' + (t === 'login'    ? ' active' : '');
  document.getElementById('tab-register').className = 'tab' + (t === 'register' ? ' active' : '');
  document.getElementById('auth-err').textContent = '';
};

window.doLogin = async () => {
  const e = document.getElementById('l-email').value;
  const p = document.getElementById('l-pass').value;
  if (!e||!p) return setErr('Remplissez tous les champs');
  if (fbReady) {
    document.getElementById('l-txt').innerHTML = '<span class="spin"></span>';
    try { await FB.signInWithEmailAndPassword(FB.auth, e, p); }
    catch(err) { setErr(errMsg(err.code)); document.getElementById('l-txt').textContent='Se connecter'; }
  } else { enterApp(); loadLocal(); }
};

window.doRegister = async () => {
  const e = document.getElementById('r-email').value;
  const p = document.getElementById('r-pass').value;
  if (!e||!p) return setErr('Remplissez tous les champs');
  if (fbReady) {
    document.getElementById('r-txt').innerHTML = '<span class="spin"></span>';
    try { await FB.createUserWithEmailAndPassword(FB.auth, e, p); }
    catch(err) { setErr(errMsg(err.code)); document.getElementById('r-txt').textContent='Créer mon compte'; }
  } else { enterApp(); loadLocal(); }
};

window.doLogout = async () => {
  if (fbReady) await FB.signOut(FB.auth);
  else showAuth();
  ops = [];
};

function setErr(m) { document.getElementById('auth-err').textContent = m; }
function errMsg(c) {
  return ({
    'auth/user-not-found':'Email introuvable','auth/wrong-password':'Mot de passe incorrect',
    'auth/email-already-in-use':'Email déjà utilisé','auth/weak-password':'Mot de passe trop court',
    'auth/invalid-credential':'Identifiants invalides','auth/invalid-email':'Email invalide'
  })[c] || 'Erreur de connexion';
}

function showAuth() {
  document.getElementById('auth-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
}

function enterApp() {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
}

// ── FIREBASE DATA ──
function listenFB() {
  if (!fbReady || !fbUser) return;
  const r = FB.ref(FB.db, 'users/' + fbUser.uid + '/ops');
  FB.onValue(r, snap => {
    ops = snap.exists() ? Object.values(snap.val()) : [];
    render();
  });
}

async function saveFB() {
  if (!fbReady || !fbUser) { saveLocal(); return; }
  const obj = {};
  ops.forEach(o => obj[o.id] = o);
  await FB.set(FB.ref(FB.db, 'users/' + fbUser.uid + '/ops'), obj);
}

// ── LOCAL STORAGE ──
function saveLocal() { localStorage.setItem('mc_ops', JSON.stringify(ops)); }
function loadLocal() { ops = JSON.parse(localStorage.getItem('mc_ops') || '[]'); render(); }

// ── TYPE SELECTION ──
window.setType = t => {
  currentType = t;
  ['dep','apl','ent'].forEach(x => {
    const b = document.getElementById('btn-'+x);
    b.className = 'type-btn';
    if (x===t) b.classList.add('active-'+x);
  });
  // Pre-fill amount for APL
  if (t === 'apl') {
    document.getElementById('qa-label').value  = 'APL';
    document.getElementById('qa-amount').value = '199';
    document.getElementById('qa-label').placeholder = 'APL Logement';
  } else if (t === 'dep') {
    document.getElementById('qa-label').placeholder = 'Ex: Pharmacie, Courses, Loyer…';
    if (document.getElementById('qa-label').value === 'APL') document.getElementById('qa-label').value = '';
    if (document.getElementById('qa-amount').value === '199') document.getElementById('qa-amount').value = '';
  } else {
    document.getElementById('qa-label').placeholder = 'Ex: Salaire, Remboursement…';
    if (document.getElementById('qa-label').value === 'APL') document.getElementById('qa-label').value = '';
    if (document.getElementById('qa-amount').value === '199') document.getElementById('qa-amount').value = '';
  }
};

// ── ADD ──
window.addOp = () => {
  const label  = document.getElementById('qa-label').value.trim();
  const amount = parseFloat(document.getElementById('qa-amount').value);

  if (!label)          return flash('qa-label',  'Entrez un libellé');
  if (isNaN(amount) || amount <= 0) return flash('qa-amount','Montant invalide');

  const op = {
    id:     Date.now().toString(),
    label,
    amount: currentType === 'dep' ? -Math.abs(amount) : Math.abs(amount),
    type:   currentType,
    date:   new Date().toISOString()
  };

  ops.unshift(op);
  saveFB();
  if (!fbReady) render();

  document.getElementById('qa-label').value  = '';
  document.getElementById('qa-amount').value = '';
  if (currentType === 'apl') setType('dep');
};

function flash(id, msg) {
  const el = document.getElementById(id);
  el.style.borderColor = 'var(--minus)';
  el.placeholder = msg;
  setTimeout(() => { el.style.borderColor=''; el.placeholder = id==='qa-label' ? 'Ex: Pharmacie…':'Montant'; }, 1800);
}

// ── DELETE ──
window.deleteOp = id => {
  ops = ops.filter(o => o.id !== id);
  saveFB();
  if (!fbReady) render();
};

// ── EDIT ──
window.openEdit = id => {
  const op = ops.find(o => o.id === id);
  if (!op) return;
  editId = id;
  document.getElementById('edit-label').value  = op.label;
  document.getElementById('edit-amount').value = Math.abs(op.amount);
  document.getElementById('overlay').classList.add('open');
};

window.closeEdit = () => {
  document.getElementById('overlay').classList.remove('open');
  editId = null;
};

window.saveEdit = () => {
  const op = ops.find(o => o.id === editId);
  if (!op) return;
  const label  = document.getElementById('edit-label').value.trim();
  const amount = parseFloat(document.getElementById('edit-amount').value);
  if (!label || isNaN(amount) || amount <= 0) return;
  op.label  = label;
  op.amount = op.amount < 0 ? -amount : amount;
  saveFB();
  if (!fbReady) render();
  closeEdit();
};

// ── RENDER ──
function render() {
  const filtered = filterMonth === 'all' ? ops : ops.filter(o => {
    const d = new Date(o.date);
    return d.getMonth() === parseInt(filterMonth);
  });

  // Solde
  const solde = filtered.reduce((a, o) => a + o.amount, 0);
  const plus  = filtered.filter(o => o.amount > 0 && o.type !== 'apl').reduce((a,o)=>a+o.amount,0);
  const minus = filtered.filter(o => o.amount < 0).reduce((a,o)=>a+Math.abs(o.amount),0);
  const apl   = filtered.filter(o => o.type === 'apl').reduce((a,o)=>a+o.amount,0);

  const el = document.getElementById('solde-display');
  el.textContent = fmt(solde);
  el.className = 'solde-amount ' + (solde > 0 ? 'pos' : solde < 0 ? 'neg' : 'zero');

  document.getElementById('total-plus').textContent  = fmt(plus);
  document.getElementById('total-minus').textContent = fmt(minus);
  document.getElementById('total-apl').textContent   = fmt(apl);
  document.getElementById('ops-count').textContent   = filtered.length + ' op.';

  // Month filter pills
  const months = [...new Set(ops.map(o => new Date(o.date).getMonth()))].sort();
  const mf = document.getElementById('month-filter');
  if (months.length > 1) {
    mf.innerHTML = `<button class="month-pill ${filterMonth==='all'?'active':''}" onclick="setFilter('all')">Tout</button>`
      + months.map(m => `<button class="month-pill ${filterMonth==m?'active':''}" onclick="setFilter(${m})">${MOIS_FULL[m]}</button>`).join('');
    mf.style.display = 'flex';
  } else { mf.style.display = 'none'; }

  // List
  const list = document.getElementById('ops-list');
  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty"><div class="empty-icon">📂</div><div class="empty-txt">Aucune opération${filterMonth!=='all'?' ce mois-ci':' — ajoutez-en une ci-dessus'}</div></div>`;
    return;
  }

  list.innerHTML = filtered.map(o => {
    const d = new Date(o.date);
    const icon = o.type==='dep' ? '💸' : o.type==='apl' ? '🏠' : '💰';
    const amtClass = o.type==='dep' ? 'dep' : o.type==='apl' ? 'apl' : 'ent';
    const tagLabel = o.type==='dep' ? 'dépense' : o.type==='apl' ? 'APL' : 'entrée';
    const sign = o.amount >= 0 ? '+' : '';
    return `
      <div class="op-item">
        <div class="op-icon ${amtClass}">${icon}</div>
        <div class="op-info">
          <div class="op-label">${esc(o.label)}<span class="tag tag-${amtClass}">${tagLabel}</span></div>
          <div class="op-date">${d.toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric'})} · ${d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}</div>
        </div>
        <div class="op-amount ${amtClass}">${sign}${fmt(o.amount)}</div>
        <button class="btn-del" onclick="openEdit('${o.id}')" title="Modifier">✎</button>
        <button class="btn-del" onclick="deleteOp('${o.id}')" title="Supprimer">✕</button>
      </div>
    `;
  }).join('');
}

window.setFilter = m => { filterMonth = m; render(); };

// ── HELPERS ──
function fmt(n) {
  const abs = Math.abs(n).toLocaleString('fr-FR',{minimumFractionDigits:2,maximumFractionDigits:2});
  return (n < 0 ? '-' : '') + abs + ' €';
}
function esc(s) { return s.replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── THEME ──
window.toggleTheme = () => {
  const html = document.documentElement;
  const dark = html.getAttribute('data-theme') === 'dark';
  html.setAttribute('data-theme', dark ? 'light' : 'dark');
  document.querySelector('.btn-icon').textContent = dark ? '🌙' : '☀️';
};

// Init mode local si pas de Firebase
if (!fbReady) { loadLocal(); }
</script>
</body>
</html>
